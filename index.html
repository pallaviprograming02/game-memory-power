<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Pro - Ultimate Brain Trainer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">

</head>

<body class="p-4 md:p-8">

    <!-- Splash/Menu Screen -->
    <div id="menu-screen" class="max-w-md mx-auto mt-12 space-y-8 animate-in fade-in duration-700">
        <div class="text-center space-y-2">
            <h1
                class="text-5xl font-extrabold tracking-tight bg-gradient-to-r from-blue-400 to-indigo-500 bg-clip-text text-transparent">
                Memory Pro
            </h1>
            <p class="text-slate-400">Challenge your brain, master your focus.</p>
        </div>

        <div class="glass p-8 rounded-3xl space-y-6">
            <!-- Difficulty Selection -->
            <div class="space-y-3">
                <label class="text-sm font-semibold uppercase tracking-wider text-slate-400">Select Difficulty</label>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setDifficulty('easy')" id="btn-easy"
                        class="diff-btn p-3 rounded-xl border-2 border-transparent bg-slate-800 hover:bg-slate-700 transition-all">
                        <div class="text-lg font-bold">Easy</div>
                        <div class="text-xs text-slate-400">4x3</div>
                    </button>
                    <button onclick="setDifficulty('medium')" id="btn-medium"
                        class="diff-btn p-3 rounded-xl border-2 border-blue-500 bg-blue-500/10 transition-all">
                        <div class="text-lg font-bold">Medium</div>
                        <div class="text-xs text-blue-300">4x4</div>
                    </button>
                    <button onclick="setDifficulty('hard')" id="btn-hard"
                        class="diff-btn p-3 rounded-xl border-2 border-transparent bg-slate-800 hover:bg-slate-700 transition-all">
                        <div class="text-lg font-bold">Hard</div>
                        <div class="text-xs text-slate-400">5x4</div>
                    </button>
                </div>
            </div>

            <!-- Theme Selection -->
            <div class="space-y-3">
                <label class="text-sm font-semibold uppercase tracking-wider text-slate-400">Select Theme</label>
                <div class="grid grid-cols-3 gap-3">
                    <button onclick="setTheme('animals')" id="theme-animals"
                        class="theme-btn p-4 rounded-xl border-2 border-blue-500 bg-blue-500/10 transition-all text-2xl">🦁</button>
                    <button onclick="setTheme('fruits')" id="theme-fruits"
                        class="theme-btn p-4 rounded-xl border-2 border-transparent bg-slate-800 transition-all text-2xl">🍎</button>
                    <button onclick="setTheme('objects')" id="theme-objects"
                        class="theme-btn p-4 rounded-xl border-2 border-transparent bg-slate-800 transition-all text-2xl">🚀</button>
                </div>
            </div>

            <button onclick="startGame()"
                class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold text-xl shadow-lg shadow-blue-500/20 transition-all active:scale-95">
                Start Mission
            </button>
        </div>

        <!-- Leaderboard Preview -->
        <div id="leaderboard-preview" class="glass p-6 rounded-3xl">
            <h3 class="font-bold mb-4 flex items-center gap-2">
                <span>🏆</span> Best Performance
            </h3>
            <div id="stats-container" class="space-y-2 text-sm">
                <!-- Stats injected here -->
                <p class="text-slate-500 italic">No games played yet. Be the first!</p>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="hidden max-w-4xl mx-auto space-y-6">
        <div class="flex flex-wrap items-center justify-between gap-4">
            <button onclick="backToMenu()"
                class="p-2 hover:bg-slate-800 rounded-lg transition-colors flex items-center gap-2">
                <span>←</span> Back
            </button>
            <div class="flex gap-4">
                <div class="glass px-4 py-2 rounded-xl">
                    <span class="text-slate-400 text-xs block uppercase">Moves</span>
                    <span id="move-count" class="text-xl font-bold">0</span>
                </div>
                <div class="glass px-4 py-2 rounded-xl">
                    <span class="text-slate-400 text-xs block uppercase">Time</span>
                    <span id="timer" class="text-xl font-bold">00:00</span>
                </div>
            </div>
            <div class="flex gap-2">
                <button id="hint-btn" onclick="useHint()"
                    class="p-3 bg-yellow-500/20 hover:bg-yellow-500/40 text-yellow-500 rounded-xl transition-all"
                    title="Hint (Reveal All)">
                    💡
                </button>
                <button onclick="resetGame()" class="p-3 bg-slate-800 hover:bg-slate-700 rounded-xl transition-all">
                    🔄
                </button>
            </div>
        </div>

        <div id="game-grid" class="grid gap-3 md:gap-4 mx-auto">
            <!-- Cards injected here -->
        </div>
    </div>

    <!-- Victory Modal -->
    <div id="victory-modal"
        class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
        <div class="glass max-w-sm w-full p-8 rounded-3xl text-center space-y-6 scale-in-center">
            <div class="text-6xl">🎉</div>
            <h2 class="text-3xl font-bold">Mission Complete!</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800/50 p-4 rounded-2xl">
                    <div class="text-slate-400 text-xs uppercase">Moves</div>
                    <div id="final-moves" class="text-2xl font-bold text-blue-400">24</div>
                </div>
                <div class="bg-slate-800/50 p-4 rounded-2xl">
                    <div class="text-slate-400 text-xs uppercase">Time</div>
                    <div id="final-time" class="text-2xl font-bold text-indigo-400">01:24</div>
                </div>
            </div>
            <div id="new-record" class="hidden text-yellow-400 font-bold animate-bounce">
                ⭐ New Record! ⭐
            </div>
            <div class="space-y-3">
                <button onclick="startGame()"
                    class="w-full py-4 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold transition-all">
                    Play Again
                </button>
                <button onclick="backToMenu()"
                    class="w-full py-4 bg-slate-800 hover:bg-slate-700 rounded-xl font-bold transition-all">
                    Main Menu
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
